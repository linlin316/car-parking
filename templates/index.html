{% extends "layout.html" %}
{% block content %}
<div class="chat-container">
  <div class="app-header">🚗駐車場検索</div>
  <div id="clientArea" class="client-area"></div>
  <div id="chatBody"></div>
  <div id="mapArea" style="display:none;"></div>
  <div class="input-area">
    <div class="button-row">
      <button id="addClient">客先を追加</button>
    </div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="AIに話しかけて駐車場を探す...">
      <button id="chatSend">➤</button>
      <button id="micBtn">🎤</button>
    </div>
  </div>
</div>
{% endblock %}
