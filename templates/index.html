{% extends "layout.html" %}
{% block content %}
<div class="chat-container">
  <div class="app-header">🚗駐車場検索</div>
  <div class="facility-search-area">
    <input type="text" id="facilityInput" placeholder="施設名を入力...">
    <div id="autocompleteList" class="autocomplete-list"></div>
  </div>
  <div id="historyArea" class="history-area"></div>
  <div id="chatBody"></div>
  <div id="mapArea" style="display:none;"></div>
  <div class="input-area">
    <div class="button-row">
      <button id="gpsSearch">📍現在地から探す</button>
      <button id="chatReset">🔄会話リセット</button>
    </div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="メッセージを入力...">
      <button id="chatSend">➤</button>
      <button id="micBtn">🎤</button>
    </div>
  </div>
</div>
{% endblock %}
